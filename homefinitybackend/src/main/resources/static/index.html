<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HomeFinity Backend</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: #ffffff;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.08);
            padding: 50px 60px;
            border-radius: 16px;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            max-width: 520px;
            width: 90%;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 16px;
            letter-spacing: 0.5px;
        }

        p {
            font-size: 16px;
            opacity: 0.9;
            margin-bottom: 28px;
        }

        .status {
            display: inline-block;
            padding: 10px 18px;
            background-color: #22c55e;
            color: #052e16;
            font-weight: 600;
            border-radius: 999px;
            font-size: 14px;
        }

        footer {
            margin-top: 30px;
            font-size: 13px;
            opacity: 0.7;
        }
    </style>
</head>

<body>
<div class="container">
    <h1>HomeFinity Backend 🚀</h1>
    <p>HomeFinity Backend application is up and running </p>
    <div class="status">● Server Status: Active</div>
</div>
</body>
</html>
